<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="#1A73E8"/>

  <g clip-path="url(#iconClip)">
    <!-- Fan blades -->
    <g transform="translate(512, 480)" fill="white" opacity="0.95">
      <!-- Top blade -->
      <path d="M0,-40 C-60,-100 -80,-220 -20,-300 C20,-320 60,-280 60,-220 C60,-160 40,-100 0,-40Z" />
      <!-- Top-right blade -->
      <path d="M35,-20 C105,-60 215,-45 280,20 C290,65 245,90 190,70 C135,50 80,15 35,-20Z" />
      <!-- Bottom-right blade -->
      <path d="M35,20 C90,70 140,175 120,260 C90,295 45,270 35,215 C25,160 30,85 35,20Z" />
      <!-- Bottom blade -->
      <path d="M0,40 C60,100 80,220 20,300 C-20,320 -60,280 -60,220 C-60,160 -40,100 0,40Z" />
      <!-- Bottom-left blade -->
      <path d="M-35,20 C-105,60 -215,45 -280,-20 C-290,-65 -245,-90 -190,-70 C-135,-50 -80,-15 -35,20Z" />
      <!-- Top-left blade -->
      <path d="M-35,-20 C-90,-70 -140,-175 -120,-260 C-90,-295 -45,-270 -35,-215 C-25,-160 -30,-85 -35,-20Z" />

      <!-- Center hub -->
      <circle cx="0" cy="0" r="50" fill="white"/>
      <circle cx="0" cy="0" r="28" fill="#1A73E8"/>
      <circle cx="0" cy="0" r="10" fill="white"/>
    </g>

    <!-- Temperature indicator bar at bottom -->
    <g transform="translate(512, 820)">
      <rect x="-180" y="-16" width="360" height="32" rx="16" fill="white" opacity="0.2"/>
      <rect x="-180" y="-16" width="240" height="32" rx="16" fill="white" opacity="0.5"/>
      <!-- Tick marks -->
      <circle cx="-140" cy="0" r="4" fill="white" opacity="0.8"/>
      <circle cx="-80" cy="0" r="4" fill="white" opacity="0.8"/>
      <circle cx="-20" cy="0" r="4" fill="white" opacity="0.8"/>
      <circle cx="40" cy="0" r="4" fill="white" opacity="0.8"/>
    </g>
  </g>
</svg>
